    <title>The World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">select a city...</option>
        <option value="">London</option>
        <option value="">Paris</option>
        <option value="">New york</option>
      </select>

      <div class="city">
        <h2>Los-Angeles 🇺🇸</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
      </div>

      <div class="city">
        <h2>Sydney 🇦🇺</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
      </div>

      <div class="city">
        <h2>Tokyo 🇯🇵</h2>
        <div class="date">August 15th 2022</div>
        <div class="time">1:48:15 AM</div>
      </div>
    </div>
