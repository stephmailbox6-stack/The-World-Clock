<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="designs/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>The World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a city...</option>
        <option value="">London</option>
        <option value="">Paris</option>
        <option value="">New york</option>
      </select>

      <div class="city" id="los-angeles">
        <div>
          <h2>Los-Angeles 🇺🇸</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="sydney">
        <div>
          <h2>Sydney 🇦🇺</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>

      <div class="city" id="tokyo">
        <div>
          <h2>Tokyo 🇯🇵</h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>

    <footer>
      This project was coded by
      <a href="https://github.com/stephmailbox6-stack" target="_blank">
        Stephanie Okoye</a
      >, opensourced on
      <a
        href="https://github.com/stephmailbox6-stack/The-World-Clock"
        target="_blank"
        >Github</a
      >
      and hosted on
      <a href="https://the-world-clock-st.netlify.app/" target="_blank">
        Netlify.</a
      >
    </footer>
    <script src="designs/index.js"></script>
  </body>
</html>
